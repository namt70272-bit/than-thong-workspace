name: PR Review
on:
  pull_request:
    paths: ['**.py', '**.md', 'tests/**', '**/workflows/**']
  workflow_dispatch:

jobs:
  review:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Pytest
        run: python -m pytest tests/ -v
      
      - name: Syntax check
        run: python -c "
import os, ast
errors = []
for root, dirs, files in os.walk('.'):
  for f in files:
    if f.endswith('.py'):
      try:
        ast.parse(open(os.path.join(root,f), 'r', encoding='utf-8', errors='replace').read())
      except SyntaxError as e:
        errors.append(f'{f}: {e}')
if errors:
  for e in errors: print(f'SYNTAX ERROR: {e}')
  exit(1)
print('ALL .py files pass syntax check')
"
      
      - name: Pip check
        run: pip check || echo "Pip conflicts detected (non-critical)"
      
      - name: Compliance check
        run: |
          python -c "
import os
# Check for hardcoded secrets
issues = []
for root, dirs, files in os.walk('.'):
  dirs[:] = [d for d in dirs if d not in ('.git','node_modules','__pycache__','_work','runner')]
  for f in files:
    if f.endswith(('.py','.sh','.yml','.yaml','.ps1')):
      try:
        content = open(os.path.join(root,f), 'r', errors='replace').read()
        for pattern in ['api_key','api.secret','password=','token=']:
          if pattern in content.lower():
            issues.append(f'{f}: contains \"{pattern}\"')
      except: pass
if issues:
  for i in issues: print(f'WARN: {i}')
else:
  print('No hardcoded secrets detected')
"
