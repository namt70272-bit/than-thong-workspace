name: Auto Test
on:
  push:
    paths: ['**.py', '**.md', 'tests/**', 'run_tests.py']
  pull_request:
    paths: ['**.py', 'tests/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Run pytest
        run: python -m pytest tests/ -v
        
      - name: Syntax check
        run: python -c "
import os, ast
errors = []
for root, dirs, files in os.walk('.'):
  for f in files:
    if f.endswith('.py'):
      try:
        ast.parse(open(os.path.join(root,f), 'r', encoding='utf-8', errors='replace').read())
      except SyntaxError as e:
        errors.append(f'{f}: {e}')
if errors:
  for e in errors: print(f'SYNTAX ERROR: {e}')
  exit(1)
print('ALL .py files pass syntax check')
"
      
      - name: Ruff lint check
        run: ruff check . --ignore E501 --exit-zero 2>&1 | tail -20
